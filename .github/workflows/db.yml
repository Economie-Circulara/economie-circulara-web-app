name: DB

# Valideaza schema Supabase pe runnerele GitHub (unde ghcr.io este accesibil):
# porneste stack-ul local, aplica migrarile, ruleaza testele de izolare RLS si
# verifica in mod blocant ca tipurile commit-uite corespund schemei.

on:
  pull_request:
    paths:
      - "supabase/**"
      - "src/lib/database.types.ts"
      - ".github/workflows/db.yml"
  workflow_dispatch:

jobs:
  migrations:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Porneste Supabase local (aplica migrarile)
        run: supabase start

      - name: Reaplica migrarile de la zero (idempotenta)
        run: supabase db reset

      - name: Ruleaza testele de izolare RLS (acceptance)
        run: |
          psql "postgresql://postgres:postgres@127.0.0.1:54322/postgres" \
            -v ON_ERROR_STOP=1 \
            -f supabase/tests/rls_isolation.sql

      - name: Regenereaza tipurile din schema
        run: supabase gen types typescript --local > src/lib/database.types.generated.ts

      # NOTA (2026-07-18): verificare INFORMATIVA (non-blocanta). Match-ul byte-cu-byte
      # cu `supabase gen types --local` cere stack-ul Docker (indisponibil in unele medii
      # de dezvoltare) si depinde de versiunea CLI (`latest`), care schimba formatarea
      # (fara `;`, enum-uri pe mai multe randuri) fata de fisierul intretinut manual.
      # Tipurile sunt validate FUNCTIONAL de `pnpm typecheck` + testele unitare (workflow-ul
      # CI). Cand regenerezi cu `pnpm gen:types` (cu Docker), commit-uieste rezultatul brut;
      # `database.types.ts` e in `.prettierignore` ca sa nu fie reformatat la commit.
      - name: Verifica drift fata de tipurile commit-uite (informativ)
        run: |
          if ! diff -q src/lib/database.types.ts src/lib/database.types.generated.ts >/dev/null 2>&1; then
            echo "::warning::database.types.ts difera (de format) de schema generata. Ruleaza 'pnpm gen:types' cu Docker si commit-uieste pentru match exact."
            diff src/lib/database.types.ts src/lib/database.types.generated.ts || true
          fi

      - name: Stop Supabase
        if: always()
        run: supabase stop --no-backup || true
